<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aria — learn by teaching</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add,arrow_back,arrow_downward,check,close,cloud_off,content_copy,dark_mode,delete,description,edit,error,history_edu,hub,light_mode,login,logout,menu_book,more_vert,picture_as_pdf,priority_high,school,send,settings,stop,travel_explore,upload_file&display=block"
      rel="stylesheet"
    />
    <script>
      // Theme flash guard: set theme + palette before the bundle loads.
      (function () {
        var stored = localStorage.getItem("aria-theme");
        var theme =
          stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.dataset.theme = theme;
        var palette = localStorage.getItem("aria-palette");
        document.documentElement.dataset.palette = palette === "purple" ? "purple" : "blue";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
